name: Update TryHackMe Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Update badge
        uses: p4p1/tryhackme-badge-workflow@main
        with:
          username: "riyalimba"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
